spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: pizzaria-service
          uri: lb://pizzaria-service
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1
        - id: estoque-service
          uri: lb://estoque-service
          predicates:
            - Path=/api-estoque/**
          filters:
            - StripPrefix=1

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

jwt:
  secret: ${JWT_SECRET:minha-chave-secreta-super-segura-para-jwt-256-bits!!}
