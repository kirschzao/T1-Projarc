spring:
  application:
    name: estoque-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/estoquedb
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:estoque}
    password: ${DB_PASSWORD:estoque123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
