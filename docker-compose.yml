version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: telepizzadb_container
    restart: always
    environment:
      POSTGRES_DB: telepizzadb
      POSTGRES_USER: user_pizza
      POSTGRES_PASSWORD: password_pizza
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: telepizza_app
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/telepizzadb
      - SPRING_DATASOURCE_USERNAME=user_pizza
      - SPRING_DATASOURCE_PASSWORD=password_pizza
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - db

volumes:
  pgdata:
